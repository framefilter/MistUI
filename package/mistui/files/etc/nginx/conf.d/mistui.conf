# MistUI TLS vhost. nginx terminates HTTPS and proxies to the daemon on
# loopback. The daemon never speaks TLS itself — keeps the binary small.
server {
	listen 443 ssl default_server;
	listen [::]:443 ssl default_server;
	server_name _;

	# Reuse OpenWRT's self-signed cert (px5g/openssl-generated at first boot).
	ssl_certificate     /etc/nginx/conf.d/_lan.crt;
	ssl_certificate_key /etc/nginx/conf.d/_lan.key;

	location / {
		proxy_pass http://127.0.0.1:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Proto https;
	}
}
